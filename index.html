<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WAH IMPERIUM ROYAL ARTISAN EMPIRE GLOBAL LIMITED</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* LOADING SCREEN */
        #loading {
            position: fixed;
            width: 100%;
            height: 100vh;
            background-color: #000; /* BLACK BACKGROUND */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        #loading img {
            width: 200px;
        }

        /* MAIN WEBSITE */
        #website {
            display: none;
            background-color: #000; /* BLACK BACKGROUND */
            color: gold;
            min-height: 100vh;
            text-align: center;
            padding-top: 100px;
        }

        /* MAIN LOGO INSIDE WEBSITE */
        .main-logo {
            width: 250px; /* Bigger logo */
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>

<body>

    <!-- LOADING SCREEN -->
    <div id="loading">
        <img src="./images/sadiq.jpeg">
    </div>

    <!-- MAIN WEBSITE CONTENT -->
    <div id="website">

        <!-- SAME LOGO USED AGAIN (JUST BIGGER) -->
        <img src="./images/sadiq.jpeg" class="main-logo">

        <h1>WAH IMPERIUM ROYAL ARTISAN EMPIRE GLOBAL LIMITED</h1>

        <p>Welcome to the Official Royal Artisan Platform.</p>
        <p>Empire. Power. Structure. Excellence.</p>

    </div>

    <script>
        /* KEEPING YOUR PERFECT 45 SECONDS */
        setTimeout(function() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("website").style.display = "block";
        }, 45000);
    </script>

</body>
</html>

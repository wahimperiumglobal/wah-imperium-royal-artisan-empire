<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Royal Empire Global</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #loading img {
            width: 150px;
        }

        /* Main Content Hidden First */
        #main-content {
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
     <img src="sodiq.jpeg" alt="Royal Imperium logo">
        <h2>Loading Royal Empire...</h2>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <h1>WAH IMPERIUM ROYAL ARTISAN EMPIRE GLOBAL LIMITED</h1>
        <p>Welcome to Version 1.0 Foundation.</p>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }, 3000);
    </script>

</body>
</html>
